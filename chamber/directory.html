<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title and Meta -->
    <title>Johannesburg Chamber Directory of Local Businesses</title>
    <meta name="description" content="Discover and connect with trusted businesses in the Johannesburg Chamber of Commerce directory. Find services, contact details, and more.">
    <meta name="author" content="Katleho Selwana">

    <!-- Open Graph for Social Media -->
    <meta property="og:title" content="Johannesburg Chamber Directory of Local Businesses">
    <meta property="og:description" content="Discover and connect with trusted businesses in the Johannesburg Chamber of Commerce directory. Find services, contact details, and more.">
    <meta property="og:image" content="https://katleho1231.github.io/wdd231/chamber/images/chamber.jpg">
    <meta property="og:url" content="https://katleho1231.github.io/wdd231/chamber/directory.html">
    <meta property="og:type" content="website">

    <!-- Favicon -->
    <link rel="icon" href="images/chamber-favicon.ico" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="../styles/normalize.css">
    <link rel="stylesheet" href="../styles/small.css">
    <link rel="stylesheet" href="../styles/larger.css">
</head>

<body>
    <!-- Header -->
    <header>
        <h1>Johannesburg Chamber Directory</h1>
        <nav>
            <a href="../index.html">Home</a>
            <a href="directory.html">Directory</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <section>
            <h2>Member Directory</h2>

            <!-- Layout Toggle Buttons -->
            <div id="layout-buttons">
                <button id="grid-view">Grid View</button>
                <button id="list-view">List View</button>
            </div>

            <!-- Container for Members -->
            <div id="members-container" class="grid"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>Johannesburg Chamber of Commerce | WDD 231 | &copy; <span id="year"></span></p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>

    <!-- JSON Data Folder -->
    <script>
        const membersContainer = document.getElementById('members-container');
        const gridBtn = document.getElementById('grid-view');
        const listBtn = document.getElementById('list-view');

        // Fetch member JSON data
        async function loadMembers() {
            try {
                const response = await fetch('data/members.json');
                const members = await response.json();
                displayMembers(members);
            } catch (error) {
                membersContainer.innerHTML = '<p>Error loading members.</p>';
                console.error(error);
            }
        }

        // Display members
        function displayMembers(members) {
            membersContainer.innerHTML = '';
            members.forEach(member => {
                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <img src="images/${member.image}" alt="${member.name}">
                    <h3>${member.name}</h3>
                    <p>${member.address}</p>
                    <p>${member.phone}</p>
                    <p><a href="${member.website}" target="_blank">${member.website}</a></p>
                    <p>Membership Level: ${member.membership}</p>
                `;
                membersContainer.appendChild(card);
            });
        }

        // Layout toggle
        gridBtn.addEventListener('click', () => {
            membersContainer.className = 'grid';
        });
        listBtn.addEventListener('click', () => {
            membersContainer.className = 'list';
        });

        // Display year and last modified
        document.getElementById('year').textContent = new Date().getFullYear();
        document.getElementById('last-modified').textContent = document.lastModified;

        loadMembers();
    </script>
</body>
</html>
